name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege by default; jobs opt into more if they need it.
permissions:
  contents: read

# Cancel superseded runs for the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────── Kotlin build + test ─────────────────────────
  build-test:
    name: build + test (kotlin)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Assemble boot jar
        run: ./gradlew :collab-bootstrap:bootJar --no-daemon

      - name: Upload boot jar
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: collab-docs-jar
          path: collab-bootstrap/build/libs/collab-docs.jar
          if-no-files-found: error
          retention-days: 7

  # ───────────────────────── realtime-gateway (node) ─────────────────────────
  gateway:
    name: build + test (gateway)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: realtime-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: realtime-gateway/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ───────────────────────── Helm validation ─────────────────────────
  helm-validate:
    name: helm validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KUBECONFORM_VERSION: "0.6.7"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.16.2

      - name: Install kubeconform
        run: |
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz kubeconform
          sudo install -m 0755 kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Helm lint (dev + prod)
        run: |
          helm lint helm/collab-docs
          helm lint helm/collab-docs -f helm/collab-docs/values-prod.yaml

      - name: Helm template | kubeconform (dev)
        run: |
          helm template collab-docs helm/collab-docs --namespace collab \
            | kubeconform -strict -ignore-missing-schemas -summary -kubernetes-version 1.29.0

      - name: Helm template | kubeconform (prod)
        run: |
          helm template collab-docs helm/collab-docs --namespace collab \
            -f helm/collab-docs/values-prod.yaml \
            | kubeconform -strict -ignore-missing-schemas -summary -kubernetes-version 1.29.0

      - name: Helm unittest (pinned container)
        run: |
          docker run --rm --user 0 \
            -v "${{ github.workspace }}/helm:/apps" \
            helmunittest/helm-unittest:3.20.2-1.1.0 collab-docs

  # ───────────────────────── Static analysis / linters ─────────────────────────
  lint:
    name: lint (actions + dockerfiles)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          fail-on-error: true

      - name: hadolint (app Dockerfile)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning

      - name: hadolint (gateway Dockerfile)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: realtime-gateway/Dockerfile
          failure-threshold: warning
