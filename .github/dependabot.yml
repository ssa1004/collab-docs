version: 2
updates:
  # Kotlin / Spring Boot (Gradle multi-module).
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      gradle-dependencies:
        patterns:
          - "*"

  # realtime-gateway (Node.js / npm).
  - package-ecosystem: npm
    directory: "/realtime-gateway"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # GitHub Actions used by the CI workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Container base images (app + gateway Dockerfiles).
  - package-ecosystem: docker
    directories:
      - "/"
      - "/realtime-gateway"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      docker-images:
        patterns:
          - "*"
