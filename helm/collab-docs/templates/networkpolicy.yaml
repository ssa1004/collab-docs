{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "collab-docs.fullname" . }}
  labels:
    {{- include "collab-docs.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "collab-docs.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingressFrom }}
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
        {{- else }}
        # Default: allow ingress from pods in the same namespace.
        - podSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    {{- if .Values.networkPolicy.allowDnsEgress }}
    # DNS resolution.
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
