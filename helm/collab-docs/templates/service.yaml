apiVersion: v1
kind: Service
metadata:
  name: {{ include "collab-docs.fullname" . }}
  labels:
    {{- include "collab-docs.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.portName }}
      protocol: TCP
      name: {{ .Values.service.portName }}
  selector:
    {{- include "collab-docs.selectorLabels" . | nindent 4 }}
