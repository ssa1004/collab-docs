suite: optional resources (gated)
templates:
  - templates/hpa.yaml
  - templates/pdb.yaml
  - templates/networkpolicy.yaml
  - templates/servicemonitor.yaml
tests:
  - it: renders nothing by default
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an HPA when autoscaling is enabled
    template: templates/hpa.yaml
    set:
      autoscaling.enabled: true
      autoscaling.minReplicas: 3
      autoscaling.maxReplicas: 9
      autoscaling.targetCPUUtilizationPercentage: 70
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
      - equal:
          path: spec.minReplicas
          value: 3
      - equal:
          path: spec.maxReplicas
          value: 9
      - equal:
          path: spec.metrics[0].resource.target.averageUtilization
          value: 70

  - it: renders a PDB when enabled
    template: templates/pdb.yaml
    set:
      podDisruptionBudget.enabled: true
      podDisruptionBudget.minAvailable: 2
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 2

  - it: renders a NetworkPolicy guarding the app port with DNS egress
    template: templates/networkpolicy.yaml
    set:
      networkPolicy.enabled: true
    asserts:
      - isKind:
          of: NetworkPolicy
      - contains:
          path: spec.policyTypes
          content: Ingress
      - contains:
          path: spec.policyTypes
          content: Egress
      - equal:
          path: spec.ingress[0].ports[0].port
          value: 8080

  - it: renders a ServiceMonitor when enabled
    template: templates/servicemonitor.yaml
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: spec.endpoints[0].path
          value: /actuator/prometheus
