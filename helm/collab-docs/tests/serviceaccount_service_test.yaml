suite: service account and service
templates:
  - templates/serviceaccount.yaml
  - templates/service.yaml
tests:
  - it: creates a ServiceAccount with token automount disabled by default
    template: templates/serviceaccount.yaml
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: does not create a ServiceAccount when disabled
    template: templates/serviceaccount.yaml
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: exposes a ClusterIP service on the named http port
    template: templates/service.yaml
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 8080
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].name
          value: http
