events {}

http {
    server {
        listen 8080;

        # auth-service (Spring Authorization Server) 의 OIDC / OAuth2 엔드포인트 두 종류 모두
        # 정적 파일로 모사. collab-docs 의 prod 프로필이 어느 경로를 jwk-set-uri 로 쓸지
        # 정해도 동작하도록 두 곳 모두 노출.
        location /.well-known/jwks.json {
            default_type application/json;
            alias /usr/share/nginx/html/jwks.json;
        }

        location /oauth2/jwks {
            default_type application/json;
            alias /usr/share/nginx/html/jwks.json;
        }

        location /healthz {
            return 200 "ok\n";
        }
    }
}
